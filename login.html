<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMI Home Automation — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f0e; --surface: #131918; --surface2: #1a2120;
    --border: #243030; --accent: #00e5a0; --accent2: #00b07a;
    --danger: #ff4d6d; --text: #e8f0ef; --muted: #6b8a85;
    --font-head: 'Syne', sans-serif; --font-mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
  }
  .bg-glow {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,160,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .login-wrap {
    position: relative;
    width: 100%;
    max-width: 400px;
    padding: 16px;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
  }
  .brand {
    font-family: var(--font-head);
    font-weight: 800;
    font-size: 1.5rem;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .brand-sub {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-family: var(--font-mono);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.04em;
  }
  .btn-login:hover { background: var(--accent2); }
  .flash { padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; margin-bottom: 20px; border-left: 3px solid; }
  .flash.error { background: rgba(255,77,109,0.08); border-color: var(--danger); color: var(--danger); }
  .visitor-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    font-size: 0.75rem;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }
  .visitor-link:hover { color: var(--accent); }
  .divider { text-align: center; color: var(--muted); font-size: 0.7rem; margin: 16px 0; letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">SMI·HAS</div>
    <div class="brand-sub">Home Automation System</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
    <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Sign In →</button>
    </form>

    <div class="divider">──────────────</div>
    <a href="{{ url_for('visitor_portal') }}" class="visitor-link">I'm a visitor — Enter PIN ↗</a>
  </div>
</div>
</body>
</html>
